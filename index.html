<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内部设备领用登记</title>
    <meta name="color-scheme" content="light" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="./assets/app.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Arial', 'sans-serif'],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur border-b border-slate-200">
      <div class="mx-auto max-w-6xl px-4">
        <div class="flex items-center justify-between py-3">
          <div class="flex items-center gap-3">
            <div class="h-9 w-9 rounded-lg bg-slate-900 text-white grid place-items-center font-semibold">
              领
            </div>
            <div class="leading-tight">
              <div class="text-sm font-semibold">内部设备管理</div>
              <div class="text-xs text-slate-600">设备领用登记</div>
            </div>
          </div>

          <nav class="hidden sm:flex items-center gap-6" aria-label="顶部导航">
            <a href="#" class="text-sm font-medium text-slate-900 border-b-2 border-slate-900/90 pb-1">设备领用</a>
            <a href="#" class="text-sm font-medium text-slate-600 hover:text-slate-900 hover:border-b-2 hover:border-slate-900/20 pb-1 transition">我的申请</a>
            <a href="#" class="text-sm font-medium text-slate-600 hover:text-slate-900 hover:border-b-2 hover:border-slate-900/20 pb-1 transition">管理员入口</a>
          </nav>

          <div class="flex items-center gap-2">
            <a
              href="#"
              class="sm:hidden inline-flex items-center gap-2 text-sm font-semibold text-slate-900 hover:text-slate-700 rounded-lg px-2 py-2"
            >
              菜单
            </a>
            <span
              id="currentUserLabel"
              class="hidden items-center rounded-full bg-slate-100 text-slate-700 ring-1 ring-slate-200 px-2.5 py-1 text-xs font-semibold"
            ></span>
            <button
              id="loginOpenBtn"
              type="button"
              class="inline-flex items-center gap-2 rounded-lg bg-slate-900 px-3 py-2 text-sm font-semibold text-white hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900/20"
            >
              登录
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-6">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-xl sm:text-2xl font-semibold">NuraLogix设备列表</h1>
          <p class="text-sm text-slate-600 mt-1">选择“领用”填写信息并提交登记。111</p>
        </div>
        <div class="flex items-center gap-3">
          <div class="relative w-full sm:w-72">
            <input
              id="searchInput"
              type="text"
              placeholder="搜索设备名称或型号"
              class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-900/30"
            />
          </div>
        </div>
      </div>

      <section class="mt-5">
        <div id="deviceGrid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
      </section>
    </main>

    <!-- 领用表单弹窗 -->
    <div id="modalOverlay" class="fixed inset-0 z-40 hidden">
      <div class="absolute inset-0 bg-slate-900/50"></div>
      <div class="relative min-h-full flex items-center justify-center p-4">
        <div
          role="dialog"
          aria-modal="true"
          aria-labelledby="modalTitle"
          class="w-full max-w-lg rounded-2xl bg-white shadow-xl ring-1 ring-slate-900/10 overflow-hidden"
        >
          <div class="px-5 py-4 border-b border-slate-200 flex items-start justify-between gap-4">
            <div>
              <div id="modalTitle" class="text-base font-semibold">设备领用登记</div>
              <div id="deviceSummary" class="text-sm text-slate-600 mt-1">选择设备后填写信息</div>
            </div>
            <button
              id="modalCloseBtn"
              type="button"
              class="shrink-0 rounded-lg p-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900/10"
              aria-label="关闭"
            >
              <span class="text-lg leading-none">&times;</span>
            </button>
          </div>

          <form id="applyForm" class="px-5 py-4" autocomplete="off">
            <div class="space-y-4">
              <input type="hidden" id="selectedDeviceId" />

              <div>
                <label for="applyName" class="block text-sm font-medium text-slate-900">姓名</label>
                <input
                  id="applyName"
                  name="name"
                  type="text"
                  required
                  placeholder="例如：张三"
                  class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-900/30"
                />
              </div>

              <div>
                <label for="applyDept" class="block text-sm font-medium text-slate-900">部门</label>
                <input
                  id="applyDept"
                  name="department"
                  type="text"
                  required
                  placeholder="例如：研发部"
                  class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-900/30"
                />
              </div>

              <div>
                <label for="applyDueDate" class="block text-sm font-medium text-slate-900">预计归还日期</label>
                <input
                  id="applyDueDate"
                  name="dueDate"
                  type="date"
                  required
                  class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-900/30"
                />
              </div>

              <div id="formError" class="hidden text-sm text-red-600">
                请完整填写表单信息。
              </div>
            </div>

            <div class="mt-5 flex items-center justify-end gap-3 border-t border-slate-200 pt-4">
              <button
                id="modalCancelBtn"
                type="button"
                class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50"
              >
                取消
              </button>
              <button
                id="modalSubmitBtn"
                type="submit"
                class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900/20"
              >
                提交领用
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginOverlay" class="fixed inset-0 z-50 hidden">
      <div class="absolute inset-0 bg-slate-900/50"></div>
      <div class="relative min-h-full flex items-center justify-center p-4">
        <div
          role="dialog"
          aria-modal="true"
          aria-labelledby="loginTitle"
          class="w-full max-w-md rounded-2xl bg-white shadow-xl ring-1 ring-slate-900/10 overflow-hidden"
        >
          <div class="px-5 py-4 border-b border-slate-200 flex items-start justify-between gap-4">
            <div>
              <div id="loginTitle" class="text-base font-semibold">登录</div>
              <div id="loginHint" class="text-sm text-slate-600 mt-1">输入用户名和密码继续</div>
            </div>
            <button
              id="loginCloseBtn"
              type="button"
              class="shrink-0 rounded-lg p-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900/10"
              aria-label="关闭"
            >
              <span class="text-lg leading-none">&times;</span>
            </button>
          </div>

          <form id="loginForm" class="px-5 py-4" autocomplete="off">
            <div class="space-y-4">
              <div>
                <label for="loginUsername" class="block text-sm font-medium text-slate-900">用户名/邮箱</label>
                <input
                  id="loginUsername"
                  name="username"
                  type="text"
                  required
                  placeholder="例如：michael@company.com"
                  class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-900/30"
                />
              </div>

              <div>
                <label for="loginPassword" class="block text-sm font-medium text-slate-900">密码</label>
                <input
                  id="loginPassword"
                  name="password"
                  type="password"
                  required
                  placeholder="请输入密码"
                  class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-900/30"
                />
              </div>

              <div id="loginError" class="hidden text-sm text-red-600">
                登录失败，请检查账号密码。
              </div>
            </div>

            <div class="mt-5 flex items-center justify-end gap-3 border-t border-slate-200 pt-4">
              <button
                id="loginCancelBtn"
                type="button"
                class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50"
              >
                取消
              </button>
              <button
                id="loginSubmitBtn"
                type="submit"
                class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900/20"
              >
                <span id="loginSubmitText">登录</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
